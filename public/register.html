<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCar Manager | Crear cuenta</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body class="vh-100">

  <!-- NAVBAR -->
  <nav class="navbar bg-white shadow-sm py-3">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="./index.html">
        <i class="bi bi-car-front-fill text-primary fs-3"></i>
        <span class="fs-5">RentCar Manager</span>
      </a>
    </div>
  </nav>

  <!-- FORMULARIO DE REGISTRO -->
  <main class="d-flex align-items-center justify-content-center py-5" style="min-height: calc(100vh - 80px);">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">

          <div class="card border-0">
            <div class="card-body p-4 p-md-5">

              <!-- Ícono y encabezado -->
              <div class="text-center mb-4">
                <div
                  class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3"
                  style="width: 70px; height: 70px; background: var(--success-gradient);"
                >
                  <i class="bi bi-person-plus-fill text-white" style="font-size: 2rem;"></i>
                </div>
                <h1 class="h3 fw-bold mb-1">Crear Cuenta</h1>
                <p class="text-secondary mb-0">Únete y empieza a rentar tu próximo auto</p>
              </div>

              <!-- Alertas -->
              <div id="registerAlert"   class="alert alert-danger  d-none" role="alert"></div>
              <div id="registerSuccess" class="alert alert-success d-none" role="alert"></div>

              <!-- Formulario -->
              <form id="registerForm" novalidate>

                <div class="form-floating mb-3">
                  <input
                    type="text"
                    class="form-control"
                    id="name"
                    placeholder="Tu nombre completo"
                    required
                    autocomplete="name"
                  >
                  <label for="name">
                    <i class="bi bi-person me-1"></i>Nombre completo
                  </label>
                </div>

                <div class="form-floating mb-3">
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    placeholder="correo@ejemplo.com"
                    required
                    autocomplete="email"
                  >
                  <label for="email">
                    <i class="bi bi-envelope me-1"></i>Correo electrónico
                  </label>
                </div>

                <div class="form-floating mb-3">
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    placeholder="Mínimo 6 caracteres"
                    required
                    autocomplete="new-password"
                  >
                  <label for="password">
                    <i class="bi bi-lock me-1"></i>Contraseña (mínimo 6 caracteres)
                  </label>
                </div>

                <div class="form-floating mb-4">
                  <input
                    type="password"
                    class="form-control"
                    id="confirmPassword"
                    placeholder="Repite tu contraseña"
                    required
                    autocomplete="new-password"
                  >
                  <label for="confirmPassword">
                    <i class="bi bi-lock-fill me-1"></i>Confirmar contraseña
                  </label>
                </div>

                <div class="d-grid mb-3">
                  <button type="submit" id="registerBtn" class="btn btn-success btn-lg">
                    <i class="bi bi-person-check me-2"></i>Registrarse
                  </button>
                </div>

                <p class="text-center text-secondary small mb-0">
                  ¿Ya tienes una cuenta?
                  <a href="./login.html" class="text-primary text-decoration-none fw-semibold">
                    Inicia sesión aquí
                  </a>
                </p>

              </form>

            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./assets/js/register.js"></script>
</body>
</html>
