<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCar Manager | Iniciar sesión</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body class="vh-100">

  <!-- NAVBAR -->
  <nav class="navbar bg-white shadow-sm py-3">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="./index.html">
        <i class="bi bi-car-front-fill text-primary fs-3"></i>
        <span class="fs-5">RentCar Manager</span>
      </a>
    </div>
  </nav>

  <!-- FORMULARIO DE LOGIN -->
  <main class="d-flex align-items-center justify-content-center py-5" style="min-height: calc(100vh - 80px);">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">

          <div class="card border-0">
            <div class="card-body p-4 p-md-5">

              <!-- Logo y encabezado (con acceso oculto a admin) -->
              <div class="text-center mb-4">
                <a href="./admin-register.html" class="text-decoration-none" title="RentCar Manager">
                  <i class="bi bi-car-front-fill text-primary" style="font-size: 3.5rem; cursor: pointer;"></i>
                </a>
                <h1 class="h3 fw-bold mt-2 mb-1">RentCar Manager</h1>
                <p class="text-secondary mb-0">Bienvenido de nuevo</p>
              </div>

              <!-- Alerta de error -->
              <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

              <!-- Formulario -->
              <form id="loginForm" novalidate>

                <div class="form-floating mb-3">
                  <input
                    type="email"
                    class="form-control"
                    id="loginEmail"
                    placeholder="correo@ejemplo.com"
                    required
                    autocomplete="email"
                  >
                  <label for="loginEmail">
                    <i class="bi bi-envelope me-1"></i>Correo electrónico
                  </label>
                </div>

                <div class="form-floating mb-4">
                  <input
                    type="password"
                    class="form-control"
                    id="loginPassword"
                    placeholder="Contraseña"
                    required
                    autocomplete="current-password"
                  >
                  <label for="loginPassword">
                    <i class="bi bi-lock me-1"></i>Contraseña
                  </label>
                </div>

                <div class="d-grid mb-3">
                  <button type="submit" id="loginBtn" class="btn btn-primary btn-lg">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                  </button>
                </div>

                <p class="text-center text-secondary small mb-0">
                  ¿No tienes una cuenta?
                  <a href="./register.html" class="text-primary text-decoration-none fw-semibold">
                    Regístrate aquí
                  </a>
                </p>

              </form>

            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./assets/js/login.js"></script>
</body>
</html>
