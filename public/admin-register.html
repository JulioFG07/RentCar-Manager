<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCar Manager | Registro Administrador</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body class="vh-100">

  <!--  NAVBAR  -->
  <nav class="navbar bg-white shadow-sm py-3">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="./index.html">
        <i class="bi bi-car-front-fill text-primary fs-3"></i>
        <span class="fs-5">RentCar Manager</span>
      </a>
    </div>
  </nav>

  <!-- FORMULARIO DE REGISTRO DE ADMIN -->
  <main class="d-flex align-items-center justify-content-center py-5" style="min-height: calc(100vh - 80px);">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">

          <div class="card border-0">
            <div class="card-body p-4 p-md-5">

              <!-- Ícono y encabezado -->
              <div class="text-center mb-4">
                <div
                  class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3"
                  style="width: 70px; height: 70px; background: var(--primary-gradient);"
                >
                  <i class="bi bi-shield-lock-fill text-white" style="font-size: 2rem;"></i>
                </div>
                <h1 class="h3 fw-bold mb-1">Registro de Administrador</h1>
                <p class="text-secondary mb-0">Acceso restringido al personal autorizado</p>
              </div>

              <!-- Aviso -->
              <div class="alert alert-warning border-0 small mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-1"></i>
                Esta página es solo para crear cuentas con permisos administrativos.
                Necesitas la clave de acceso del sistema.
              </div>

              <!-- Alertas dinámicas -->
              <div id="adminAlert"   class="alert alert-danger  d-none" role="alert"></div>
              <div id="adminSuccess" class="alert alert-success d-none" role="alert"></div>

              <!-- Formulario -->
              <form id="adminRegisterForm" novalidate>

                <div class="form-floating mb-3">
                  <input
                    type="text"
                    class="form-control"
                    id="adminName"
                    placeholder="Nombre completo"
                    required
                    autocomplete="name"
                  >
                  <label for="adminName">
                    <i class="bi bi-person me-1"></i>Nombre completo
                  </label>
                </div>

                <div class="form-floating mb-3">
                  <input
                    type="email"
                    class="form-control"
                    id="adminEmail"
                    placeholder="correo@ejemplo.com"
                    required
                    autocomplete="email"
                  >
                  <label for="adminEmail">
                    <i class="bi bi-envelope me-1"></i>Correo electrónico
                  </label>
                </div>

                <div class="form-floating mb-3">
                  <input
                    type="password"
                    class="form-control"
                    id="adminPassword"
                    placeholder="Mínimo 6 caracteres"
                    required
                    autocomplete="new-password"
                  >
                  <label for="adminPassword">
                    <i class="bi bi-lock me-1"></i>Contraseña (mínimo 6 caracteres)
                  </label>
                </div>

                <div class="form-floating mb-3">
                  <input
                    type="password"
                    class="form-control"
                    id="adminConfirmPassword"
                    placeholder="Repite tu contraseña"
                    required
                    autocomplete="new-password"
                  >
                  <label for="adminConfirmPassword">
                    <i class="bi bi-lock-fill me-1"></i>Confirmar contraseña
                  </label>
                </div>

                <div class="form-floating mb-4">
                  <input
                    type="password"
                    class="form-control"
                    id="adminSecretKey"
                    placeholder="Clave de acceso"
                    required
                  >
                  <label for="adminSecretKey">
                    <i class="bi bi-key-fill me-1"></i>Clave de acceso del sistema
                  </label>
                </div>

                <div class="d-grid mb-3">
                  <button type="submit" id="adminRegisterBtn" class="btn btn-primary btn-lg">
                    <i class="bi bi-shield-check me-2"></i>Registrar Administrador
                  </button>
                </div>

                <p class="text-center text-secondary small mb-0">
                  <a href="./login.html" class="text-primary text-decoration-none fw-semibold">
                    <i class="bi bi-arrow-left me-1"></i>Volver al inicio de sesión
                  </a>
                </p>

              </form>

            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./assets/js/admin-register.js"></script>
</body>
</html>
